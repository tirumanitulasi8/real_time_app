<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h2>⚙ Settings</h2>

    <a href="/dashboard/{{username}}">⬅ Back</a>

    <hr>

    <!-- Profile Update -->
    <h3>👤 Update Profile</h3>

    <form method="POST" action="/update_profile/{{username}}" enctype="multipart/form-data">
        <input type="file" name="profile_pic">
        <textarea name="bio" placeholder="Enter your bio"></textarea>
        <button type="submit">Update Profile</button>
    </form>

    <hr>

    <!-- Change Password -->
    <h3>🔑 Change Password</h3>

    <form method="POST" action="/change_password/{{username}}">
        <input type="password" name="new_password" placeholder="New Password" required>
        <button type="submit">Update Password</button>
    </form>

    <hr>

    <!-- Delete Account -->
    <h3>⚠ Danger Zone</h3>

    <a href="/delete_account/{{username}}" style="color:red;">
        🗑 Delete My Account
    </a>

</div>

</body>
</html>
